  default_prompt: "Use $dahuang-human-tone 清理下面这段中文里的 AI 味。优先调整组织方式和句式结构，删除模板腔、路标词、升华收尾、假互动与段落同构；保留事实、术语、观点和原有语气："
capabilities:
